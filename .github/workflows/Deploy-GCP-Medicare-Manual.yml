name: CI/CD Pipeline with Manager Approval (Manual Trigger)+ Release Notes (Google Cloud)

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  SERVICE_NAME: medicare-app
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}

permissions:
  contents: read
  actions: read
  issues: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

# -------------------------------------------------
# JOB 1 - BUILD + FETCH FIXED ISSUES
# -------------------------------------------------
  build:
    name: Build Application Package
    runs-on: ubuntu-latest

    outputs:
      commit_message: ${{ steps.commit.outputs.commit_message }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Read Commit Message
        id: commit
        shell: bash
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Fetch Closed GitHub Issues
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 5
            });

            let output = '';

            for (const issue of issues.data) {
              if (!issue.pull_request) {
                output += `#${issue.number} - ${issue.title}\n`;
              }
            }

            core.setOutput(
              "resolved_issues",
              output || "No recent resolved issues found."
            );

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore Packages
        run: dotnet restore MediCare.csproj

      - name: Build Project
        run: dotnet build MediCare.csproj --configuration Release --no-restore

      - name: Publish Application
        run: dotnet publish MediCare.csproj --configuration Release --no-build -o publish

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest

# -------------------------------------------------
# JOB 2 - SEND APPROVAL EMAIL TO MANAGER
# -------------------------------------------------
  approval-mail:
    name: Send Approval Request
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Approval Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Approval Required | Production Deployment | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <html>
            <body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#333;">

            <table width="100%" cellpadding="0" cellspacing="0">
              <tr>
                <td align="center" style="padding:30px;">

                  <table width="720" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                    <tr>
                      <td style="background:#0d6efd;color:#ffffff;padding:22px 30px;">
                        <h2 style="margin:0;">Production Deployment Approval Required</h2>
                      </td>
                    </tr>

                    <tr>
                      <td style="padding:30px;">

                        <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>

                        <p>
                          A new production build has completed successfully and is now waiting for your approval.
                        </p>

                        <h3 style="color:#0d6efd;">Deployment Summary</h3>

                        <table width="100%" cellpadding="8" cellspacing="0"
                          style="border-collapse:collapse;border:1px solid #dee2e6;">

                          <tr><td style="background:#f8f9fa;"><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Status</b></td><td style="color:#198754;"><b>Ready for Approval</b></td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Requested By</b></td><td>${{ github.actor }}</td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
                          <tr><td style="background:#f8f9fa;"><b>Environment</b></td><td>Production</td></tr>

                        </table>

                        <h3 style="color:#198754;margin-top:25px;">Resolved Issues</h3>

                        <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

                        <h3 style="color:#0d6efd;margin-top:25px;">Approval Steps</h3>

                        <ol style="line-height:1.8;">
                          <li>Open GitHub Repository</li>
                          <li>Go to Actions</li>
                          <li>Open latest workflow run</li>
                          <li>Click Review Deployments</li>
                          <li>Approve Production Deployment</li>
                        </ol>

                        <p style="margin-top:25px;">
                          Deployment will begin automatically immediately after approval.
                        </p>

                        <p style="margin-top:30px;">
                          Regards,<br>
                          <b>DevOps Automation Team</b>
                        </p>

                      </td>
                    </tr>

                  </table>

                </td>
              </tr>
            </table>

            </body>
            </html>

# -------------------------------------------------
# JOB 3 - WAIT FOR MANAGER APPROVAL
# -------------------------------------------------
  approval:
    name: Production Approval
    needs: approval-mail
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Await Approval
        run: echo "Waiting for manager approval"

# -------------------------------------------------
# JOB 4 - DEPLOY AFTER APPROVAL
# -------------------------------------------------
  deploy:
    name: Deploy to GCP Cloud Run
    needs:
      - approval
      - build
    runs-on: ubuntu-latest

    outputs:
      service_url: ${{ steps.url.outputs.service_url }}

    environment:
      name: production

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy Application
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --timeout 300

      - name: Get Service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
          --region ${{ env.REGION }} \
          --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

# -------------------------------------------------
# JOB 5 - SUCCESS MAIL
# -------------------------------------------------
  success-mail:
    name: Send Deployment Success Mail
    needs:
      - deploy
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Deployment Successful | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}

          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">

              <h2 style="color:#198754;">Production Deployment Successful</h2>

              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>

              <p>
                Approved deployment has completed successfully.
              </p>

              <table border="1" cellpadding="8" cellspacing="0"
                style="border-collapse:collapse;width:100%;">

                <tr><td><b>Application</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:#198754;"><b>SUCCESSFUL</b></td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Application URL</b></td>
                <td>
                  <a href="${{ needs.deploy.outputs.service_url }}">
                    ${{ needs.deploy.outputs.service_url }}
                  </a>
                </td></tr>

              </table>

              <h3 style="color:#198754;margin-top:25px;">Resolved Issues</h3>

              <pre style="background:#f8f9fa;padding:16px;border:1px solid #dee2e6;white-space:pre-wrap;">${{ needs.build.outputs.resolved_issues }}</pre>

              <p>Production environment is now live.</p>

              <p>Regards,<br><b>DevOps Automation Team</b></p>

            </body>
            </html>