name: CI/CD Pipeline with Change Report + Manager Approval + Manual Trigger (Google Cloud)

on:
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  DOTNET_VERSION: 8.0.x
  SERVICE_NAME: medicare-app
  MANAGER_EMAIL: ${{ vars.MANAGER_EMAIL }}
  MANAGER_NAME: ${{ vars.MANAGER_NAME }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:

# -------------------------------------------------
# JOB 1 - BUILD + CHANGE SUMMARY
# -------------------------------------------------
  build:
    name: Build Website Package
    runs-on: ubuntu-latest

    outputs:
      changed_files: ${{ steps.diff.outputs.changed_files }}
      commit_message: ${{ steps.commit.outputs.commit_message }}
      code_changes: ${{ steps.patch.outputs.code_changes }}
      change_stats: ${{ steps.stats.outputs.change_stats }}
      resolved_issues: ${{ steps.issues.outputs.resolved_issues }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Read Commit Message
        id: commit
        shell: bash
        run: |
          echo "commit_message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Detect Changed Files
        id: diff
        shell: bash
        run: |
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Change Statistics
        id: stats
        shell: bash
        run: |
          echo "change_stats<<EOF" >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Capture Safe Change Summary
        id: patch
        shell: bash
        run: |
          echo "code_changes<<EOF" >> $GITHUB_OUTPUT
          echo "Source code updated and reviewed for deployment." >> $GITHUB_OUTPUT
          git diff --stat HEAD~1 HEAD >> $GITHUB_OUTPUT || true
          echo "EOF" >> $GITHUB_OUTPUT


      - name: Fetch Fixed GitHub Issues
        id: issues
        uses: actions/github-script@v7
        with:
         script: |
          const owner = context.repo.owner;
          const repo = context.repo.repo;

          const issues = await github.rest.issues.listForRepo({
            owner,
            repo,
            state: 'closed',
            sort: 'updated',
            direction: 'desc',
            per_page: 5
          });

          let output = '';

          for (const issue of issues.data) {
            if (!issue.pull_request) {
              output += `#${issue.number} - ${issue.title}\n`;
            }
          }

          core.setOutput("resolved_issues", output || "No recent resolved issues found.");

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore MediCare.csproj

      - name: Build
        run: dotnet build MediCare.csproj --configuration Release --no-restore

      - name: Publish
        run: dotnet publish MediCare.csproj --configuration Release --no-build -o publish

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
          -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest .

      - name: Push Docker Image
        run: |
          docker push \
          us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest

# -------------------------------------------------
# JOB 2 - SEND APPROVAL EMAIL
# -------------------------------------------------
  approval-mail:
    name: Send Approval Email
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Send Approval Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Deployment Approval Required for Google Cloud | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">
              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>
              <p>
                Latest build for <b>${{ github.repository }}</b> completed successfully
                and is ready for production approval.
              </p>

              <h3 style="color:#0d6efd;">Deployment Summary</h3>

              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Repository</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESS</b></td></tr>
                <tr><td><b>Triggered By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>
                <tr><td><b>Environment</b></td><td>Production</td></tr>
              </table>

              <br>

              <h3 style="color:#0d6efd;">Files Changed</h3>
              <pre style="background:#f4f4f4;padding:12px;border:1px solid #ddd;">${{ needs.build.outputs.changed_files }}</pre>

              <h3 style="color:#0d6efd;">Change Statistics</h3>
              <pre style="background:#f8f9fa;padding:12px;border:1px solid #ddd;">${{ needs.build.outputs.change_stats }}</pre>

              <h3 style="color:#0d6efd;">Code Changes Preview</h3>
              <pre style="background:#f8f9fa;padding:12px;border:1px solid #ddd;white-space:pre-wrap;">${{ needs.build.outputs.code_changes }}</pre>

              <h3 style="color:#0d6efd;">Approval Steps</h3>
              <ol>
                <li>Open GitHub Repository</li>
                <li>Go to Actions</li>
                <li>Open latest workflow run</li>
                <li>Click Review Deployments</li>
                <li>Approve and Deploy</li>
              </ol>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>

# -------------------------------------------------
# JOB 3 - MANUAL APPROVAL
# -------------------------------------------------
  approval:
    name: Production Approval
    needs: approval-mail
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Await Approval
        run: echo "Waiting for manager approval"

# -------------------------------------------------
# JOB 4 - DEPLOY TO GCP CLOUD RUN
# -------------------------------------------------
  deploy:
    name: Deploy to GCP Cloud Run Production
    needs:
      - approval
      - build
    runs-on: ubuntu-latest

    outputs:
      service_url: ${{ steps.url.outputs.service_url }}

    environment:
      name: production

    steps:

      # -----------------------------------------
      # STEP 1 - SEND APPROVED / DEPLOY START MAIL
      # -----------------------------------------
      - name: Send Approval Confirmed Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Deployment Approved & Started | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body style="margin:0;padding:0;background:#f4f6f8;font-family:Arial,Helvetica,sans-serif;color:#333;">

              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="padding:30px;">

                    <table width="700" cellpadding="0" cellspacing="0" border="0"
                      style="background:#ffffff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.08);">

                      <tr>
                        <td style="background:#198754;color:#ffffff;padding:20px 30px;">
                          <h2 style="margin:0;">Deployment Approved</h2>
                        </td>
                      </tr>

                      <tr>
                        <td style="padding:30px;">

                          <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>

                          <p>
                            Your approval has been successfully received for the production deployment.
                            The deployment process has now started for the application below.
                          </p>

                          <h3 style="color:#0d6efd;margin-top:25px;">Deployment Details</h3>

                          <table width="100%" cellpadding="8" cellspacing="0"
                            style="border-collapse:collapse;border:1px solid #dee2e6;">

                            <tr>
                              <td style="background:#f8f9fa;"><b>Application</b></td>
                              <td>${{ github.repository }}</td>
                            </tr>

                            <tr>
                              <td style="background:#f8f9fa;"><b>Branch</b></td>
                              <td>${{ github.ref_name }}</td>
                            </tr>

                            <tr>
                              <td style="background:#f8f9fa;"><b>Approved By</b></td>
                              <td>${{ env.MANAGER_NAME }}</td>
                            </tr>

                            <tr>
                              <td style="background:#f8f9fa;"><b>Triggered By</b></td>
                              <td>${{ github.actor }}</td>
                            </tr>

                            <tr>
                              <td style="background:#f8f9fa;"><b>Status</b></td>
                              <td style="color:#fd7e14;"><b>Deployment In Progress</b></td>
                            </tr>

                            <tr>
                              <td style="background:#f8f9fa;"><b>Commit Message</b></td>
                              <td>${{ needs.build.outputs.commit_message }}</td>
                            </tr>

                          </table>

                          <h3 style="color:#198754;margin-top:25px;">
                            Resolved Issues
                          </h3>

                          <table width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="
                                background:#f8f9fa;
                                border:1px solid #dee2e6;
                                padding:15px;
                                font-family:Consolas,monospace;
                                font-size:14px;
                                white-space:pre-wrap;
                                line-height:1.6;">
                            ${{ needs.build.outputs.resolved_issues }}
                              </td>
                            </tr>
                          </table>

                          <p style="margin-top:25px;">
                            A final confirmation email will be sent once deployment is completed successfully.
                          </p>

                          <p style="margin-top:30px;">
                            Regards,<br>
                            <b>DevOps Automation Team</b>
                          </p>

                        </td>
                      </tr>

                    </table>

                  </td>
                </tr>
              </table>

            </body>
            </html>

      # -----------------------------------------
      # STEP 2 - AUTH TO GCP
      # -----------------------------------------
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      # -----------------------------------------
      # STEP 3 - DEPLOY
      # -----------------------------------------
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/hospital-repo/${{ env.SERVICE_NAME }}:latest \
          --region ${{ env.REGION }} \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --timeout 300

      # -----------------------------------------
      # STEP 4 - GET URL
      # -----------------------------------------
      - name: Get Service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
          --region ${{ env.REGION }} \
          --format='value(status.url)')
          echo "service_url=$URL" >> $GITHUB_OUTPUT

# -------------------------------------------------
# JOB 5 - SUCCESS MAIL
# -------------------------------------------------
  success-mail:
    name: Send Success Email
    needs:
      - deploy
      - build
    runs-on: ubuntu-latest

    steps:
      - name: Send Success Mail
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Deployment Successful | ${{ github.repository }}
          to: ${{ env.MANAGER_EMAIL }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <html>
            <body style="font-family:Arial,Helvetica,sans-serif;color:#333;line-height:1.6;">

              <h2 style="color:#198754;">Deployment Successful</h2>

              <p>Dear <b>${{ env.MANAGER_NAME }}</b>,</p>

              <p>
                Approved deployment for <b>${{ github.repository }}</b>
                has been completed successfully.
              </p>

              <h3 style="color:#198754;">Deployment Overview</h3>

              <table border="1" cellpadding="8" cellspacing="0" style="border-collapse:collapse;width:100%;">
                <tr><td><b>Application</b></td><td>${{ github.repository }}</td></tr>
                <tr><td><b>Branch</b></td><td>${{ github.ref_name }}</td></tr>
                <tr><td><b>Status</b></td><td style="color:green;"><b>SUCCESSFUL</b></td></tr>
                <tr><td><b>Executed By</b></td><td>${{ github.actor }}</td></tr>
                <tr><td><b>Commit ID</b></td><td>${{ github.sha }}</td></tr>
                <tr><td><b>Commit Message</b></td><td>${{ needs.build.outputs.commit_message }}</td></tr>

                <tr>
                  <td><b>Application URL</b></td>
                  <td>
                    <a href="${{ needs.deploy.outputs.service_url }}" target="_blank">
                      ${{ needs.deploy.outputs.service_url }}
                    </a>
                  </td>
                </tr>
              </table>

              <br>
              <h3 style="color:#198754; margin-bottom:10px; font-size:18px;">
                Resolved Issues
              </h3>

              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse; margin-bottom:20px;">
                <tr>
                  <td style="
                    background-color:#f8f9fa;
                    border:1px solid #dee2e6;
                    border-radius:6px;
                    padding:16px;
                    font-family:Consolas, Monaco, 'Courier New', monospace;
                    font-size:14px;
                    color:#212529;
                    white-space:pre-wrap;
                    line-height:1.6;
                ">
            ${{ needs.build.outputs.resolved_issues }}
                  </td>
                </tr>
              </table>
              
              <p>
                Production environment is now live and updated successfully.
              </p>

              <p>Regards,<br><b>DevOps Automation Team</b></p>
            </body>
            </html>